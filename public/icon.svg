<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a4d18c" />
      <stop offset="100%" stop-color="#7aa366" />
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4d39" />
      <stop offset="100%" stop-color="#122111" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" />
  
  <!-- Outer Ring (Dashed) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 24" opacity="0.6"/>

  <!-- Compass Markers -->
  <path d="M256 40 L256 80 M256 472 L256 432 M40 256 L80 256 M472 256 L432 256" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9" />

  <!-- Drop / Leaf Shape (North Point) -->
  <path d="M256 90 Q310 180 310 240 A54 54 0 0 1 202 240 Q202 180 256 90 Z" fill="#ffffff" filter="url(#shadow)" />
  
  <!-- Drop Highlights -->
  <path d="M256 90 Q310 180 310 240 A54 54 0 0 1 256 294 L256 90 Z" fill="#f3ede6" opacity="0.8" />

  <!-- South Point (Smaller) -->
  <path d="M256 400 L280 300 L232 300 Z" fill="#ffffff" opacity="0.5" />

  <!-- Center Dot -->
  <circle cx="256" cy="260" r="16" fill="url(#needle)" />
  <circle cx="256" cy="260" r="6" fill="#ffffff" />
</svg>
